<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IPA Phonemes Recorder</title>
    <link rel="stylesheet" href="/ui/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1 class="title">IPA Phonemes Recorder</h1>
      <div class="topbar-controls">
        <label class="bank-select-label">
          Bank
          <select id="bank-select" class="bank-select" disabled>
            <option>Loading…</option>
          </select>
        </label>
        <button id="privacy-badge" type="button" class="privacy-badge privacy-badge--unknown" hidden></button>
        <button id="export-button" class="export-button" type="button">
          Export <kbd>E</kbd>
        </button>
        <div id="health-banner" class="health-banner health-banner--unknown">
          Checking tools…
        </div>
      </div>
    </header>
    <div
      id="export-modal"
      class="modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="export-modal-title"
      hidden
    >
      <div class="modal__backdrop" data-action="close-modal"></div>
      <div class="modal__card">
        <h2 id="export-modal-title" class="modal__title">Export</h2>
        <div id="export-modal-body" class="modal__body"></div>
        <div class="modal__actions">
          <button type="button" class="modal__btn" data-action="close-modal">Close</button>
        </div>
      </div>
    </div>

    <aside class="left-panel" aria-label="Phoneme list">
      <ul id="phoneme-list" class="phoneme-list"></ul>
    </aside>

    <main class="centre-column">
      <div
        id="gitignore-banner"
        class="gitignore-banner"
        role="alert"
        hidden
      ></div>
      <section id="phoneme-detail" class="centre-panel" aria-label="Phoneme detail">
        <p class="placeholder">Select a phoneme to begin.</p>
      </section>
    </main>

    <div
      id="privacy-modal"
      class="modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="privacy-modal-title"
      hidden
    >
      <div class="modal__backdrop" data-action="close-privacy-modal"></div>
      <div class="modal__card">
        <h2 id="privacy-modal-title" class="modal__title"></h2>
        <div id="privacy-modal-body" class="modal__body"></div>
        <div id="privacy-modal-actions" class="modal__actions"></div>
      </div>
    </div>

    <footer class="bottom-zone">
      <div class="bottom-zone__row">
        <div class="mic-controls">
          <button id="mic-grant" class="mic-grant-button" type="button">
            Grant microphone
          </button>
          <span id="mic-device" class="mic-device" hidden></span>
        </div>
        <canvas
          id="meter-canvas"
          class="meter-canvas"
          aria-label="Microphone level"
          height="40"
        ></canvas>
        <button id="record" class="record-button" type="button" disabled>
          Record
        </button>
      </div>
      <div id="mic-error" class="mic-error-banner" role="alert" hidden></div>
    </footer>

    <script type="module" src="/ui/main.js"></script>
  </body>
</html>
